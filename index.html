<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goblins in the Night</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="background-overlay"></div>
        <div class="menu-container">
            <h1 class="game-title">Goblins in the Night</h1>
            
            <div class="button-group">
                <button id="btn-continue" class="menu-btn" disabled>Continue</button>
                <button id="btn-new-game" class="menu-btn">New Game</button>
                <button id="btn-settings" class="menu-btn">Settings</button>
            </div>
        </div>

        <!-- Settings View -->
        <div id="settings-view" class="menu-container hidden">
            <h2 class="game-title" style="font-size: 2.5rem;">Settings</h2>
            
            <div class="settings-content">
                <!-- Language Section -->
                <div class="setting-group">
                    <label for="setting-language">Language</label>
                    <select id="setting-language" class="setting-input">
                        <option value="en">English</option>
                        <option value="es">Español</option>
                        <option value="fr">Français</option>
                        <option value="de">Deutsch</option>
                        <option value="jp">日本語</option>
                    </select>
                </div>

                <!-- Gamma/Lighting Section -->
                <div class="setting-group">
                    <label for="setting-gamma">Lighting (Gamma)</label>
                    <div class="range-container">
                        <span class="range-icon">🌑</span>
                        <input type="range" id="setting-gamma" min="50" max="150" value="100" class="setting-range">
                        <span class="range-icon">☀️</span>
                    </div>
                </div>

                <!-- Controls Section -->
                <div class="setting-group">
                    <h3>Controls</h3>
                    
                    <!-- Mobile Controls -->
                    <div class="subsection">
                        <label>Mobile Input Style</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="mobile-control" value="joystick" checked>
                                <span class="radio-custom"></span>
                                Joystick
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="mobile-control" value="dpad">
                                <span class="radio-custom"></span>
                                D-Pad Buttons
                            </label>
                        </div>
                    </div>

                    <!-- Desktop Controls -->
                    <div class="subsection">
                        <label>Desktop Configuration</label>
                        <div class="control-display">
                            <div class="control-row">
                                <span>Keyboard:</span>
                                <select class="setting-input small">
                                    <option>WASD + Space</option>
                                    <option>Arrows + Ctrl</option>
                                </select>
                            </div>
                            <div class="control-row">
                                <span>Gamepad:</span>
                                <label class="toggle-switch">
                                    <input type="checkbox" checked>
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button id="btn-back" class="menu-btn">Back</button>
            </div>
        </div>
    </div>
    <script type="module" src="main.js"></script>

</body>
</html>
