<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goblins in the Night</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="background-overlay"></div>
        <div class="menu-container">
            <h1 class="game-title" data-i18n="gameTitle">Goblins in the Night</h1>
            
            <div class="button-group">
                <button id="btn-continue" class="menu-btn" disabled data-i18n="btnContinue">Continue</button>
                <button id="btn-new-game" class="menu-btn" data-i18n="btnNewGame">New Game</button>
                <button id="btn-settings" class="menu-btn" data-i18n="btnSettings">Settings</button>
            </div>
        </div>

        <!-- Character Creation View -->
        <div id="character-creation-view" class="menu-container hidden wide-view">
            <button id="btn-char-back" class="close-btn" aria-label="Back">←</button>
            <h2 class="game-title" style="font-size: 2rem;" data-i18n="lblChooseCharacter">Choose Your Character</h2>
            
            <div class="char-creation-content">
                <!-- 3D Preview -->
                <div class="char-preview-container">
                    <div id="char-canvas-container"></div>
                </div>

                <!-- Selection List -->
                <div class="char-selection-panel">
                    <div class="species-list">
                        <button class="species-card selected">
                            <div class="species-icon">🐱</div>
                            <div class="species-info">
                                <h3 data-i18n="speciesCat">Feline</h3>
                            </div>
                        </button>
                        
                        <button class="species-card locked">
                            <div class="species-icon">🔒</div>
                            <div class="species-info">
                                <h3 data-i18n="speciesUnknown">Locked</h3>
                            </div>
                        </button>
                        
                        <button class="species-card locked">
                            <div class="species-icon">🔒</div>
                            <div class="species-info">
                                <h3 data-i18n="speciesUnknown">Locked</h3>
                            </div>
                        </button>
                    </div>

                    <button id="btn-start-adventure" class="menu-btn primary-action" data-i18n="btnStartAdventure">Start Adventure</button>
                </div>
            </div>
        </div>

        <!-- Settings View -->
        <div id="settings-view" class="menu-container hidden">
            <button id="btn-settings-back" class="close-btn" aria-label="Back">←</button>
            <h2 class="game-title" style="font-size: 2.5rem;" data-i18n="settingsTitle">Settings</h2>
            
            <div class="settings-content">
                <!-- Language Section -->
                <div class="setting-group">
                    <label for="setting-language" data-i18n="lblLanguage">Language</label>
                    <select id="setting-language" class="setting-input">
                        <option value="en">English</option>
                        <option value="es">Español</option>
                        <option value="fr">Français</option>
                        <option value="de">Deutsch</option>
                        <option value="jp">日本語</option>
                    </select>
                </div>

                <!-- Gamma/Lighting Section -->
                <div class="setting-group">
                    <label for="setting-gamma" data-i18n="lblLighting">Lighting (Gamma)</label>
                    <div class="range-container">
                        <span class="range-icon">🌑</span>
                        <input type="range" id="setting-gamma" min="50" max="150" value="100" class="setting-range">
                        <span class="range-icon">☀️</span>
                    </div>
                </div>

                <!-- Controls Section -->
                <div class="setting-group">
                    <h3 data-i18n="lblControls">Controls</h3>
                    
                    <!-- Mobile Controls -->
                    <div class="subsection">
                        <label data-i18n="lblMobileInput">Mobile Input Style</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="mobile-control" value="joystick" checked>
                                <span class="radio-custom"></span>
                                <span data-i18n="lblJoystick">Joystick</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="mobile-control" value="dpad">
                                <span class="radio-custom"></span>
                                <span data-i18n="lblDpad">D-Pad Buttons</span>
                            </label>
                        </div>
                    </div>

                    <!-- Desktop Controls -->
                    <div class="subsection">
                        <label data-i18n="lblDesktopConfig">Desktop Configuration</label>
                        <div class="control-display">
                            <div class="control-row">
                                <span data-i18n="lblKeyboard">Keyboard:</span>
                                <select class="setting-input small">
                                    <option>WASD + Space</option>
                                    <option>Arrows + Ctrl</option>
                                </select>
                            </div>
                            <div class="control-row">
                                <span data-i18n="lblGamepad">Gamepad:</span>
                                <label class="toggle-switch">
                                    <input type="checkbox" checked>
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script type="module" src="main.js"></script>

</body>
</html>
